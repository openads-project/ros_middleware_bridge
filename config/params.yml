/**:
  ros__parameters:
    num_threads: 2
    remote_host: 127.0.0.1
    shm_namespace: middleware_bridge
    socket_buffer_bytes: 1048576
    max_udp_payload_bytes: 60000
    max_shm_message_bytes: 16777216
    shm_poll_interval_us: 1000
    reassembly_timeout_ms: 1000
    dds2zenoh.topics:
      - /clock
      - /tf
      - /tf_static
      - /image
      - /image/camera_info
      - /point_cloud
    dds2zenoh.topic_types:
      - rosgraph_msgs/msg/Clock
      - tf2_msgs/msg/TFMessage
      - tf2_msgs/msg/TFMessage
      - sensor_msgs/msg/Image
      - sensor_msgs/msg/CameraInfo
      - sensor_msgs/msg/PointCloud2
    dds2zenoh.transports:
      - udp
      - udp
      - udp
      - shm
      - udp
      - shm
    dds2zenoh.qos_depths:
      - 10
    zenoh2dds.topics:
      - /carla/ego_vehicle/vehicle_control_cmd
    zenoh2dds.topic_types:
      - carla_msgs/msg/CarlaEgoVehicleControl
    zenoh2dds.transports:
      - udp
    zenoh2dds.qos_depths:
      - 10

bridge_fast:
  ros__parameters:
    bridge_role: dds
    tx_port: 17001
    rx_port: 17002

bridge_zenoh:
  ros__parameters:
    bridge_role: zenoh
    tx_port: 17002
    rx_port: 17001
